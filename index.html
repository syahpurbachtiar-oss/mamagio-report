<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mama Gio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a2a47; --primary: #ff9800; --bg: #f0f2f5; }
        body { margin: 0; display: flex; background: var(--bg); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--sidebar); color: white; flex-shrink: 0; padding: 20px 0; }
        .sidebar h2 { color: var(--primary); text-align: center; font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; color: #adb5bd; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
        .nav-item:hover { background: #2c3e50; color: white; }
        .nav-item.active { background: #2c3e50; color: var(--primary); border-left: 4px solid var(--primary); }
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; }
        .input-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .table-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .ai-card { background: #ffffff; padding: 20px; border-radius: 12px; border-left: 5px solid #6c5ce7; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .ai-text { background: #f9f9ff; padding: 15px; border-radius: 8px; font-size: 0.9rem; color: #2d3436; line-height: 1.6; white-space: pre-line; border: 1px dashed #6c5ce7; margin-top: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; display: flex; justify-content: space-around; padding: 10px 0; }
            .sidebar h2 { display: none; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MAMA GIO ADMIN</h2>
        <div class="nav-item active" onclick="switchPage('dashboard', this)"><i class="fas fa-th-large"></i> &nbsp; Dashboard</div>
        <div class="nav-item" onclick="switchPage('pengeluaran', this)"><i class="fas fa-shopping-cart"></i> &nbsp; Pengeluaran</div>
    </div>

    <div class="main">
        <div id="dashboard" class="page-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Omzet</h3><p id="txtOmzet" style="color:#1abc9c">Rp 0</p></div>
                <div class="stat-card"><h3>Biaya</h3><p id="txtBiaya" style="color:#e74c3c">Rp 0</p></div>
                <div class="stat-card"><h3>Profit</h3><p id="txtProfit" style="color:#3498db">Rp 0</p></div>
            </div>

            <div class="input-box">
                <b><i class="fas fa-plus-circle"></i> Tambah Pengeluaran</b>
                <div class="input-row">
                    <input type="text" id="nama" placeholder="Barang...">
                    <input type="number" id="harga" placeholder="Harga Rp">
                    <button class="btn-save" id="btnSimpan" onclick="simpanBelanja()">SIMPAN</button>
                </div>
            </div>

            <div style="background:white; padding:20px; border-radius:12px;"><canvas id="chartUtama"></canvas></div>

            <div class="ai-card">
                <b><i class="fas fa-robot"></i> Laporan Strategi AI Mama Gio</b>
                <div id="aiAnalysisText" class="ai-text">Menganalisa data...</div>
            </div>
        </div>

        <div id="pengeluaran" class="page-content">
            <div class="table-card">
                <h2>Riwayat Belanja</h2>
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Hari</th><th>Tanggal</th><th>Jam</th><th>Nama Barang</th><th>Nominal</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNIIVGQuk5ZVPkIWviMkzyGzx5H_go1y7-9YaDzFNwbBi9Ds7mAUN_hxOby0SBRMYB/exec';
        let myChart;

        function switchPage(pageId, element) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                updateDashboard(data);
                renderTable(data);
                generateAI(data);
            } catch (e) { console.error(e); }
        }

        function updateDashboard(data) {
            let o = 0, b = 0;
            data.forEach(d => {
                let nom = parseInt(String(d.harga).replace(/[^0-9]/g, '')) || 0;
                if(d.tipe === 'Masuk') o += nom; else b += nom;
            });
            document.getElementById('txtOmzet').innerText = "Rp " + o.toLocaleString('id-ID');
            document.getElementById('txtBiaya').innerText = "Rp " + b.toLocaleString('id-ID');
            document.getElementById('txtProfit').innerText = "Rp " + (o - b).toLocaleString('id-ID');
            showChart(o, b);
        }

        function generateAI(data) {
            let produkPalingLaku = {};
            let totalO = 0, totalB = 0, listKeluar = [];

            data.forEach(d => {
                let n = parseInt(String(d.harga).replace(/[^0-9]/g, '')) || 0;
                if(d.tipe === 'Masuk') {
                    totalO += n;
                    if(d.nama) produkPalingLaku[d.nama] = (produkPalingLaku[d.nama] || 0) + 1;
                } else {
                    totalB += n;
                    if(d.nama) listKeluar.push(d.nama);
                }
            });

            let sorted = Object.entries(produkPalingLaku).sort((a,b) => b[1]-a[1]);
            let unggulan = sorted.length > 0 ? sorted[0][0] : "-";
            let kurangLaku = sorted.length > 1 ? sorted[sorted.length-1][0] : "-";
            
            let profitTotal = totalO - totalB;
            let avgProfit = Math.round(profitTotal / 7);
            let avgOmzet = Math.round(totalO / 7);

            let hasilAnalisa = `📊 *HASIL ANALISA AI MAMA GIO*
- *Rata-rata Profit/Hari:* Rp ${avgProfit.toLocaleString('id-ID')}
- *Produk Terlaris:* ${unggulan}
- *Produk Kurang Laku:* ${kurangLaku}
- *Rata-rata Omzet/Hari:* Rp ${avgOmzet.toLocaleString('id-ID')}
- *Prediksi Omzet Minggu Depan:* Rp ${(avgOmzet * 7).toLocaleString('id-ID')}
- *Fokus Biaya:* Pastikan stok ${listKeluar[0] || 'bahan baku'} selalu terkontrol.
- *Status Keuangan:* ${profitTotal > 0 ? 'Surplus (Aman)' : 'Defisit (Perlu Evaluasi)'}`;

            document.getElementById('aiAnalysisText').innerText = hasilAnalisa;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            data.filter(d => d.tipe === 'Keluar' && d.nama).forEach(d => {
                let nom = parseInt(String(d.harga).replace(/[^0-9]/g, '')) || 0;
                let jamBersih = d.jam.split('.').slice(0,2).join('.');
                tbody.innerHTML += `<tr><td>${d.hari}</td><td>${d.tanggal}</td><td>${jamBersih}</td><td>${d.nama}</td><td>Rp ${nom.toLocaleString('id-ID')}</td></tr>`;
            });
        }

        function showChart(o, b) {
            const ctx = document.getElementById('chartUtama').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['Masuk', 'Keluar'], datasets: [{ data: [o, b], backgroundColor: ['#1abc9c', '#e74c3c'], borderRadius: 10 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function simpanBelanja() {
            const n = document.getElementById('nama').value, h = document.getElementById('harga').value;
            if(!n || !h) return alert("Isi data!");
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "WAIT..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nama: n, harga: parseInt(h), tipe: 'Keluar' }) });
            location.reload();
        }
        fetchData();
    </script>
</body>
</html>
