<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mama Gio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a2a47; --primary: #ff9800; --bg: #f0f2f5; }
        body { margin: 0; display: flex; background: var(--bg); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--sidebar); color: white; flex-shrink: 0; padding: 20px 0; }
        .sidebar h2 { color: var(--primary); text-align: center; font-size: 1.1rem; margin-bottom: 30px; }
        .nav-item { padding: 15px 25px; color: #adb5bd; display: flex; align-items: center; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: #2c3e50; color: white; }
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; }
        .input-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid var(--primary); }
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-mic-input { background: #f1f5f9; padding: 10px 18px; border-radius: 8px; cursor: pointer; color: #64748b; border: 1px solid #ddd; }
        .table-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .tipe-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .tipe-omzet { background: #d1fae5; color: #059669; }
        .tipe-biaya { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MAMA GIO ADMIN</h2>
        <div class="nav-item active" onclick="switchPage('dashboard', this)"><i class="fas fa-th-large"></i> &nbsp; Dashboard</div>
        <div class="nav-item" onclick="switchPage('pengeluaran', this)"><i class="fas fa-wallet"></i> &nbsp; Cash Flow</div>
    </div>
    <div class="main">
        <div id="dashboard" class="page-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Omzet</h3><p id="txtOmzet">Rp 0</p></div>
                <div class="stat-card"><h3>Biaya</h3><p id="txtBiaya">Rp 0</p></div>
                <div class="stat-card"><h3>Profit</h3><p id="txtProfit">Rp 0</p></div>
            </div>
            <div class="input-box">
                <b>Tambah Pengeluaran</b>
                <div class="input-row">
                    <input type="text" id="nama" placeholder="Barang...">
                    <input type="number" id="harga" placeholder="Harga Rp">
                    <button class="btn-save" id="btnSimpan" onclick="simpanBelanja()">SIMPAN</button>
                    <button class="btn-mic-input" onclick="startVoicePengeluaran()"><i class="fas fa-microphone"></i></button>
                </div>
            </div>
        </div>
        <div id="pengeluaran" class="page-content">
            <div class="table-card">
                <h3>Riwayat Transaksi</h3>
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Hari</th><th>Tanggal</th><th>Jam</th><th>Tipe</th><th>Transaksi</th><th>Nominal</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdg_8Wp4EuWGgNoBuUyEWA3onURiKGe8iuhhgzU_QFPFHRnz9q_DdnFSCKd0zwaZ2Q/exec";

async function fetchData() {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    const cleanData = data.map(d => ({
        ...d,
        nom: parseInt(String(d.harga || d.nominal || 0).replace(/[^0-9]/g, '')) || 0,
        isO: d.tipe === 'Masuk' || (d.tipe === 'Omzet'),
        jamBersih: String(d.jam || "").replace(/\./g, ':'),
        // 🚀 FILTER PEMBERSIH TITIK DARI NAMA BARANG
        namaBersih: String(d.nama || d.transaksi || '-').replace(/\./g, '')
    }));
    updateUI(cleanData);
}

function updateUI(data) {
    let o = 0, b = 0, html = "";
    let sorted = data.sort((a,b) => {
        let tA = new Date(a.tanggal.split('/').reverse().join('-') + 'T' + a.jam.replace('.',':'));
        let tB = new Date(b.tanggal.split('/').reverse().join('-') + 'T' + b.jam.replace('.',':'));
        return tB - tA;
    });
    
    sorted.forEach(d => {
        if(d.isO) o += d.nom; else b += d.nom;
        html += `<tr><td>${d.hari||'-'}</td><td>${d.tanggal||'-'}</td><td>${d.jamBersih||'-'}</td><td><span class="tipe-badge ${d.isO?'tipe-omzet':'tipe-biaya'}">${d.isO?'Omzet':'Biaya'}</span></td><td>${d.namaBersih}</td><td style="color:${d.isO?'#059669':'#dc2626'}">${d.isO?'+':'-'} Rp ${d.nom.toLocaleString()}</td></tr>`;
    });
    
    document.getElementById('txtOmzet').innerText = "Rp " + o.toLocaleString();
    document.getElementById('txtBiaya').innerText = "Rp " + b.toLocaleString();
    document.getElementById('txtProfit').innerText = "Rp " + (o - b).toLocaleString();
    document.getElementById('tableBody').innerHTML = html;
}

function startVoicePengeluaran() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'id-ID';
    rec.start();
    rec.onresult = (e) => {
        let text = e.results[0][0].transcript.toLowerCase();
        let matches = text.match(/(\d+)/g);
        let val = matches ? parseInt(matches[matches.length-1]) : 0;
        if(val === 0) return alert("Harga tidak terdeteksi!");
        // Bersihkan titik dari nama barang saat input
        document.getElementById('nama').value = text.replace(/\d+/g, '').replace('beli', '').replace('.', '').trim();
        document.getElementById('harga').value = val;
        simpanBelanja();
    };
}

async function simpanBelanja() {
    const n = document.getElementById('nama').value;
    const h = document.getElementById('harga').value;
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nama: n, harga: h, tipe: 'Keluar' }) });
    location.reload();
}

function switchPage(p, el) {
    document.querySelectorAll('.page-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(c => c.classList.remove('active'));
    document.getElementById(p).classList.add('active');
    el.classList.add('active');
}
fetchData();
</script>
</body>
</html>
