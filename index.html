<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mama Gio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a2a47; --primary: #ff9800; --bg: #f0f2f5; }
        body { margin: 0; display: flex; background: var(--bg); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar); color: white; flex-shrink: 0; padding: 20px 0; }
        .sidebar h2 { color: var(--primary); text-align: center; font-size: 1.1rem; margin-bottom: 30px; }
        .nav-item { padding: 15px 25px; color: #adb5bd; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
        .nav-item:hover { background: #2c3e50; color: white; }
        .nav-item.active { background: #2c3e50; color: var(--primary); border-left: 4px solid var(--primary); }
        
        /* Main Content */
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; }
        
        /* Input Form */
        .input-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid var(--primary); }
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Table */
        .table-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .summary-row { background: #fff3e0; font-weight: bold; }

        .ai-chat { background: #1a2a47; color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-top: 20px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; display: flex; justify-content: space-around; padding: 10px 0; }
            .sidebar h2 { display: none; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MAMA GIO ADMIN</h2>
        <div class="nav-item active" onclick="switchPage('dashboard', this)"><i class="fas fa-th-large"></i> &nbsp; Dashboard</div>
        <div class="nav-item" onclick="switchPage('pengeluaran', this)"><i class="fas fa-shopping-cart"></i> &nbsp; Pengeluaran</div>
    </div>

    <div class="main">
        <div id="dashboard" class="page-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Omzet (Sheet1)</h3><p id="txtOmzet" style="color:#1abc9c">Rp 0</p></div>
                <div class="stat-card"><h3>Biaya (Sheet2)</h3><p id="txtBiaya" style="color:#e74c3c">Rp 0</p></div>
                <div class="stat-card"><h3>Profit</h3><p id="txtProfit" style="color:#3498db">Rp 0</p></div>
            </div>
            <div class="input-box">
                <b>Catat Pengeluaran Baru (Sheet 2)</b>
                <div class="input-row">
                    <input type="text" id="nama" placeholder="Barang...">
                    <input type="number" id="harga" placeholder="Harga Rp">
                    <button class="btn-save" id="btnSimpan" onclick="simpanBelanja()">SIMPAN DATA</button>
                </div>
            </div>
            <div style="background:white; padding:20px; border-radius:12px; min-height: 300px;"><canvas id="chartUtama"></canvas></div>
        </div>

        <div id="pengeluaran" class="page-content">
            <div class="table-card">
                <h2>Riwayat Belanja (Sheet 2)</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Hari</th>
                                <th>Tanggal</th>
                                <th>Jam</th>
                                <th>Nama Barang</th>
                                <th>Nominal</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                        <tfoot>
                            <tr class="summary-row">
                                <td colspan="3" id="totalQty" style="text-align:right">Jumlah: 0 Item</td>
                                <td colspan="2" id="totalNominal">Total: Rp 0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="ai-chat">
            <i class="fas fa-robot" style="font-size: 1.8rem; color: var(--primary);"></i>
            <div>
                <b style="color:var(--primary)">Sistem Mama Gio:</b><br>
                <span id="aiMsg">Sinkronisasi data dengan Google Sheets...</span>
            </div>
        </div>
    </div>

    <script>
        // LINK BARU YANG KAMU KASIH
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNIIVGQuk5ZVPkIWviMkzyGzx5H_go1y7-9YaDzFNwbBi9Ds7mAUN_hxOby0SBRMYB/exec';

        let myChart;

        function switchPage(pageId, element) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }

        async function fetchData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                updateDashboard(data);
                renderTable(data);
                document.getElementById('aiMsg').innerText = "Koneksi Berhasil!";
            } catch (e) { document.getElementById('aiMsg').innerText = "Gagal memuat data."; }
        }

        function updateDashboard(data) {
            let o = 0, b = 0;
            data.forEach(d => {
                let nom = parseInt(String(d.harga).replace(/[^0-9]/g, '')) || 0;
                if(d.tipe === 'Masuk') o += nom;
                else b += nom;
            });
            document.getElementById('txtOmzet').innerText = "Rp " + o.toLocaleString('id-ID');
            document.getElementById('txtBiaya').innerText = "Rp " + b.toLocaleString('id-ID');
            document.getElementById('txtProfit').innerText = "Rp " + (o - b).toLocaleString('id-ID');
            showChart(o, b);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            let tot = 0, qty = 0;
            // Filter hanya Keluar, Nama Barang ada, dan Nominal bukan NaN/0
            data.filter(d => d.tipe === 'Keluar' && d.nama).forEach(d => {
                let nom = parseInt(String(d.harga).replace(/[^0-9]/g, '')) || 0;
                if(nom > 0) {
                    qty++;
                    tot += nom;
                    // Format Jam: pastikan tidak ada detik (ambil HH.mm)
                    let jamCek = d.jam.split('.').slice(0,2).join('.');
                    tbody.innerHTML += `<tr>
                        <td>${d.hari || '-'}</td>
                        <td>${d.tanggal || '-'}</td>
                        <td>${jamCek || '-'}</td>
                        <td>${d.nama}</td>
                        <td>Rp ${nom.toLocaleString('id-ID')}</td>
                    </tr>`;
                }
            });
            document.getElementById('totalQty').innerText = "Jumlah: " + qty + " Item";
            document.getElementById('totalNominal').innerText = "Total: Rp " + tot.toLocaleString('id-ID');
        }

        function showChart(o, b) {
            const ctx = document.getElementById('chartUtama').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{ data: [o, b], backgroundColor: ['#1abc9c', '#e74c3c'], borderRadius: 10 }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        async function simpanBelanja() {
            const n = document.getElementById('nama').value;
            const h = document.getElementById('harga').value;
            if(!n || !h) return alert("Isi Data!");
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "KIRIM..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ nama: n, harga: parseInt(h), tipe: 'Keluar' }) 
                });
                alert("Berhasil!"); location.reload();
            } catch (e) { alert("Gagal!"); btn.disabled = false; }
        }
        fetchData();
    </script>
</body>
</html>
